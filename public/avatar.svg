<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#0a0a0a" stroke="url(#avatarGrad)" stroke-width="2"/>
  
  <!-- Head -->
  <rect x="60" y="45" width="80" height="90" rx="20" fill="#1a1a2e" stroke="url(#avatarGrad)" stroke-width="2"/>
  
  <!-- Eyes -->
  <ellipse cx="80" cy="80" rx="10" ry="12" fill="#0a0a0a"/>
  <ellipse cx="120" cy="80" rx="10" ry="12" fill="#0a0a0a"/>
  <circle cx="80" cy="82" r="6" fill="#10b981" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="82" r="6" fill="#10b981" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  
  <!-- Antenna -->
  <line x1="100" y1="45" x2="100" y2="25" stroke="url(#avatarGrad)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="20" r="6" fill="#10b981" filter="url(#glow)">
    <animate attributeName="r" values="6;8;6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Mouth/Speaker -->
  <rect x="80" y="105" width="40" height="8" rx="4" fill="#0a0a0a" stroke="#3b82f6" stroke-width="1"/>
  <rect x="85" y="107" width="6" height="4" rx="1" fill="#3b82f6" opacity="0.8"/>
  <rect x="94" y="107" width="6" height="4" rx="1" fill="#3b82f6" opacity="0.6"/>
  <rect x="103" y="107" width="6" height="4" rx="1" fill="#3b82f6" opacity="0.4"/>
  
  <!-- Body hint -->
  <path d="M70 135 Q70 155 85 160 L115 160 Q130 155 130 135" fill="#1a1a2e" stroke="url(#avatarGrad)" stroke-width="2"/>
  
  <!-- Status LED on body -->
  <circle cx="100" cy="150" r="4" fill="#10b981" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
